<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Legends Logging Out</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>


<header class="hero">

<div class="overlay">

<h1>LEGENDS LOGGING OUT</h1>

<p class="batch">ECE Batch 2022 – 2026</p>

<p class="tagline">
Four years. Infinite memories. One final log out.
</p>

<a href="#countdownSection" class="scroll">Enter Invitation ↓</a>

</div>

</header>



<section id="countdownSection">

<h2>Farewell Begins In</h2>

<div id="countdown"></div>

</section>



<section id="details">

<h2>Event Details</h2>

<div class="card">

<p><b>Date</b> March 30, 2026</p>
<p><b>Venue</b> MRCE OLD SEMINAR HALL </p>
<p><b>Time</b> 9.30AM Onwards</p>


</div>

</section>



<section class="rsvp">

<h2>RSVP</h2>

<div class="rsvp-card">

<input id="name" placeholder="Name">

<input id="roll" placeholder="Roll Number">

<input id="phone" placeholder="Phone Number">

<select id="attend">

<option value="">Will you attend?</option>
<option value="yes">Yes, I will attend</option>
<option value="no">Unable to attend</option>

</select>

<button onclick="submitRSVP()">Confirm Attendance</button>

</div>

</section>



<section class="memoryLane">

<h2>Memory Lane</h2>

<div class="carousel">

<div class="carouselTrack" id="carouselTrack"></div>

</div>

</section>



<footer>

<p>ECE 2026 • Legends Never Log Out</p>

</footer>



<script src="js/script.js"></script>
<script src="js/gallery.js"></script>

</body>
</html>
